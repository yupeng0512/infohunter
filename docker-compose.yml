services:
  infohunter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: infohunter
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    networks:
      - sentinel-network
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.infohunter.rule=Host(`infohunter.dev.local`)"
      - "traefik.http.routers.infohunter.entrypoints=web"
      - "traefik.http.services.infohunter.loadbalancer.server.port=6002"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:6002/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  sentinel-network:
    external: true
    name: github-sentinel_sentinel-network
  traefik-net:
    external: true
